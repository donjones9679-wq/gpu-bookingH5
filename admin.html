<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>显卡预订后台 - 灵犀智算</title>
    
    <!-- 确保 CDN 正确加载 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/umd/supabase.min.js"></script>
    
    <style>
        /* ... 你的样式 ... */
    </style>
</head>
<body>
    <!-- ... 你的 HTML ... -->

    <script>
        // ==================== 配置 ====================
        const SUPABASE_URL = 'https://ydyzjrkvmfpuqbsgbmxy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkeXpqcmt2bWZwdXFic2dibXh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzU2MzQsImV4cCI6MjA5MTcxMTYzNH0.xW3XVNJ02T-qhSUwDGOvnkqKPSPbGdE8TGjyywjopEQ';
        
        // 调试日志
        function log(msg) {
            console.log(msg);
            const debugLog = document.getElementById('debugLog');
            if (debugLog) {
                const time = new Date().toLocaleTimeString();
                debugLog.innerHTML += `[${time}] ${msg}<br>`;
            }
        }

        // 等待 Supabase 库加载完成
        let supabase;
        
        function initSupabase() {
            log('🚀 检查 Supabase 库...');
            
            // 检查不同的可能位置
            if (window.supabase && window.supabase.createClient) {
                log('✅ 找到 window.supabase');
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    log('✅ Supabase 初始化成功');
                    return true;
                } catch (err) {
                    log('❌ 初始化失败: ' + err.message);
                    return false;
                }
            } else if (window.supabaseJs && window.supabaseJs.createClient) {
                // 备用位置
                log('✅ 找到 window.supabaseJs');
                try {
                    supabase = window.supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
                    log('✅ Supabase 初始化成功');
                    return true;
                } catch (err) {
                    log('❌ 初始化失败: ' + err.message);
                    return false;
                }
            } else {
                log('❌ 未找到 Supabase 库');
                log('window.supabase = ' + typeof window.supabase);
                log('window.supabaseJs = ' + typeof window.supabaseJs);
                return false;
            }
        }

        // 延迟初始化，确保库加载完成
        window.addEventListener('load', () => {
            // 延迟 1 秒确保 CDN 加载
            setTimeout(() => {
                if (initSupabase()) {
                    loadData();
                } else {
                    document.getElementById('tableBody').innerHTML = 
                        '<tr><td colspan="7" class="error">Supabase 库加载失败，请刷新页面</td></tr>';
                }
            }, 1000);
        });

        // 加载数据函数
        async function loadData() {
            log('📡 开始加载数据...');
            
            if (!supabase) {
                log('❌ Supabase 未初始化');
                return;
            }

            try {
                const { data: bookings, error } = await supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false });

                log('📊 查询结果: ' + (bookings ? bookings.length : 0) + ' 条');

                if (error) {
                    log('❌ 查询错误: ' + error.message);
                    throw error;
                }

                // 更新统计和表格
                updateStats(bookings || []);
                renderTable(bookings || []);
                log('✅ 加载完成');

            } catch (err) {
                log('💥 错误: ' + err.message);
            }
        }

        // 更新统计
        function updateStats(bookings) {
            document.getElementById('totalCount').textContent = bookings.length;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayCount = bookings.filter(b => {
                return b.created_at && new Date(b.created_at) >= today;
            }).length;
            document.getElementById('todayCount').textContent = todayCount;

            const rtx5090Count = bookings.filter(b => {
                return b.gpu && b.gpu.toString().toLowerCase().includes('5090');
            }).length;
            document.getElementById('rtx5090Count').textContent = rtx5090Count;

            const urgentCount = bookings.filter(b => b.wait_time === 'urgent').length;
            document.getElementById('urgentCount').textContent = urgentCount;
        }

        // 渲染表格
        function renderTable(bookings) {
            const tbody = document.getElementById('tableBody');
            
            if (bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = bookings.map(b => `
                <tr>
                    <td>${b.created_at ? new Date(b.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        <div>${b.name || '未填写'}</div>
                        <div style="color:#888;font-size:12px">${b.phone || ''}</div>
                    </td>
                    <td>${b.gpu || '-'}</td>
                    <td>${b.wait_time || '-'}</td>
                    <td>${b.wait_time || '-'}</td>
                    <td>${b.user_ip || '-'}</td>
                    <td><button class="btn btn-view">查看</button></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
