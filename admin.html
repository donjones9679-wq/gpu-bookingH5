<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显卡预订后台 - 灵犀智算</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { font-size: 24px; background: linear-gradient(135deg, #00d4aa, #00a8e8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .stat-card h3 { font-size: 14px; color: #888; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #00d4aa; }
        .table-container { background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #16213e; font-weight: 600; color: #00d4aa; }
        tr:hover { background: #252542; }
        .urgency-high { color: #ff4757; font-weight: bold; }
        .urgency-normal { color: #ffa502; }
        .urgency-low { color: #2ed573; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-view { background: #00d4aa; color: #000; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { color: #ff4757; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>显卡预订管理</h1>
            <button onclick="loadData()" class="btn btn-view">刷新数据</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>总预订数</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>今日新增</h3>
                <div class="number" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>RTX 5090 需求</h3>
                <div class="number" id="rtx5090Count">0</div>
            </div>
            <div class="stat-card">
                <h3>急需客户</h3>
                <div class="number" id="urgentCount">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>提交时间</th>
                        <th>客户信息</th>
                        <th>显卡型号</th>
                        <th>紧急度</th>
                        <th>等待时长</th>
                        <th>IP地址</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ==================== 配置：替换为你的 Supabase 信息 ====================
        const SUPABASE_URL = 'https://ydyzjrkvmfpuqbsgbmxy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkeXpqcmt2bWZwdXFic2dibXh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzU2MzQsImV4cCI6MjA5MTcxMTYzNH0.xW3XVNJ02T-qhSUwDGOvnkqKPSPbGdE8TGjyywjopEQ'; // 使用 anon key，不是 publishable key
        // 初始化 Supabase
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase 初始化成功');
        } catch (err) {
            console.error('❌ Supabase 初始化失败:', err);
            document.getElementById('tableBody').innerHTML = 
                '<tr><td colspan="7" class="error">系统初始化失败，请检查配置</td></tr>';
        }

        // 加载数据
        async function loadData() {
            try {
                // 1. 获取总预订数
                const { count: totalCount, error: countError } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true });
                
                if (countError) throw countError;
                document.getElementById('totalCount').textContent = totalCount || 0;

                // 2. 获取今日新增
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const { count: todayCount, error: todayError } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true })
                    .gte('created_at', today.toISOString());
                
                if (todayError) throw todayError;
                document.getElementById('todayCount').textContent = todayCount || 0;

                // 3. 获取 RTX 5090 需求数
                const { count: rtx5090Count, error: rtxError } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true })
                    .eq('gpu', 'rtx5090');
                
                if (rtxError) throw rtxError;
                document.getElementById('rtx5090Count').textContent = rtx5090Count || 0;

                // 4. 获取急需客户数（等待时长为 urgent）
                const { count: urgentCount, error: urgentError } = await supabase
                    .from('bookings')
                    .select('*', { count: 'exact', head: true })
                    .eq('wait_time', 'urgent');
                
                if (urgentError) throw urgentError;
                document.getElementById('urgentCount').textContent = urgentCount || 0;

                // 5. 获取所有预订数据列表
                const { data: bookings, error: dataError } = await supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (dataError) throw dataError;

                // 渲染表格
                renderTable(bookings || []);

            } catch (err) {
                console.error('加载数据失败:', err);
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="7" class="error">加载失败: ${err.message}</td></tr>`;
            }
        }

        // 渲染表格
        function renderTable(bookings) {
            const tbody = document.getElementById('tableBody');
            
            if (!bookings || bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = bookings.map(booking => {
                const date = new Date(booking.created_at).toLocaleString('zh-CN');
                const urgencyClass = booking.wait_time === 'urgent' ? 'urgency-high' : 
                                    booking.wait_time === 'month' ? 'urgency-normal' : 'urgency-low';
                const urgencyText = booking.wait_time === 'urgent' ? '急需' : 
                                   booking.wait_time === 'month' ? '1月内' : '可等待';
                
                const gpuText = {
                    'rtx5090': 'RTX 5090',
                    'rtx5080': 'RTX 5080',
                    'rtx4090': 'RTX 4090',
                    'rtx4080': 'RTX 4080',
                    'other': booking.gpu_other || '其他'
                }[booking.gpu] || booking.gpu;

                return `
                    <tr>
                        <td>${date}</td>
                        <td>
                            <div>${booking.name || '未填写'}</div>
                            <div style="color: #888; font-size: 12px;">${booking.phone || ''}</div>
                        </td>
                        <td>${gpuText}</td>
                        <td class="${urgencyClass}">${urgencyText}</td>
                        <td>${booking.wait_time || '-'}</td>
                        <td>${booking.user_ip || '-'}</td>
                        <td>
                            <button class="btn btn-view" onclick="viewDetail('${booking.id}')">查看</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 查看详情
        function viewDetail(id) {
            alert('查看详情功能 - ID: ' + id);
        }

        // 页面加载时自动获取数据
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
