<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显卡预订后台 - 灵犀智算</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { font-size: 24px; background: linear-gradient(135deg, #00d4aa, #00a8e8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .stat-card h3 { font-size: 14px; color: #888; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #00d4aa; }
        .table-container { background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #16213e; font-weight: 600; color: #00d4aa; }
        tr:hover { background: #252542; }
        .urgency-high { color: #ff4757; font-weight: bold; }
        .urgency-normal { color: #ffa502; }
        .urgency-low { color: #2ed573; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-view { background: #00d4aa; color: #000; }
        .btn-refresh { background: #00a8e8; color: #fff; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { color: #ff4757; padding: 20px; text-align: center; }
        .debug-panel { 
            background: #1a1a2e; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #00d4aa;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .debug-panel strong { color: #00d4aa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>显卡预订管理</h1>
            <button onclick="loadData()" class="btn btn-refresh">刷新数据</button>
        </div>

        <!-- 调试面板 -->
        <div class="debug-panel" id="debugPanel">
            <strong>🔍 调试信息：</strong>
            <div id="debugLog"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>总预订数</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>今日新增</h3>
                <div class="number" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>RTX 5090 需求</h3>
                <div class="number" id="rtx5090Count">0</div>
            </div>
            <div class="stat-card">
                <h3>急需客户</h3>
                <div class="number" id="urgentCount">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>提交时间</th>
                        <th>客户信息</th>
                        <th>显卡型号</th>
                        <th>紧急度</th>
                        <th>等待时长</th>
                        <th>IP地址</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const SUPABASE_URL = 'https://ydyzjrkvmfpuqbsgbmxy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkeXpqcmt2bWZwdXFic2dibXh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzU2MzQsImV4cCI6MjA5MTcxMTYzNH0.xW3XVNJ02T-qhSUwDGOvnkqKPSPbGdE8TGjyywjopEQ';
        
        // 调试日志
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            document.getElementById('debugLog').innerHTML += `[${time}] ${msg}<br>`;
            console.log(msg);
        }

        // 初始化 Supabase
        let supabase;
        try {
            log('🚀 初始化 Supabase...');
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            log('✅ Supabase 初始化成功');
        } catch (err) {
            log('❌ 初始化失败: ' + err.message);
        }

        // ==================== 核心：加载数据 ====================
        async function loadData() {
            log('📡 开始加载数据...');
            
            if (!supabase) {
                log('❌ Supabase 未初始化');
                return;
            }

            try {
                // 【修复点1】使用简单的查询，确保能获取数据
                const { data: bookings, error } = await supabase
                    .from('bookings')
                    .select('*')
                    .order('created_at', { ascending: false });

                log('📊 查询结果条数: ' + (bookings ? bookings.length : 0));
                
                if (error) {
                    log('❌ 查询错误: ' + error.message);
                    throw error;
                }

                // 【修复点2】显示第一条数据内容（调试用）
                if (bookings && bookings.length > 0) {
                    log('📝 第一条数据: ' + JSON.stringify(bookings[0]).substring(0, 150));
                }

                // 【修复点3】更新统计数据（使用前端计算，避免复杂查询）
                updateStats(bookings || []);
                
                // 【修复点4】渲染表格
                renderTable(bookings || []);
                
                log('✅ 数据加载完成');

            } catch (err) {
                log('💥 错误: ' + err.message);
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="7" class="error">加载失败: ${err.message}</td></tr>`;
            }
        }

        // 更新统计数据
        function updateStats(bookings) {
            const totalCount = bookings.length;
            document.getElementById('totalCount').textContent = totalCount;
            log('📈 总预订数: ' + totalCount);

            // 今日新增
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayCount = bookings.filter(b => {
                if (!b.created_at) return false;
                return new Date(b.created_at) >= today;
            }).length;
            document.getElementById('todayCount').textContent = todayCount;

            // RTX 5090 需求（兼容大小写）
            const rtx5090Count = bookings.filter(b => {
                return b.gpu && (b.gpu.toLowerCase().includes('5090') || b.gpu === 'RTX5090');
            }).length;
            document.getElementById('rtx5090Count').textContent = rtx5090Count;

            // 急需客户
            const urgentCount = bookings.filter(b => b.wait_time === 'urgent').length;
            document.getElementById('urgentCount').textContent = urgentCount;
        }

        // 渲染表格
        function renderTable(bookings) {
            const tbody = document.getElementById('tableBody');
            
            if (bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = bookings.map(booking => {
                const date = booking.created_at 
                    ? new Date(booking.created_at).toLocaleString('zh-CN') 
                    : '未知';
                
                const urgencyClass = booking.wait_time === 'urgent' ? 'urgency-high' : 
                                    booking.wait_time === 'month' ? 'urgency-normal' : 'urgency-low';
                const urgencyText = booking.wait_time === 'urgent' ? '急需' : 
                                   booking.wait_time === 'month' ? '1月内' : '可等待';

                // 显卡型号映射
                const gpuMap = {
                    'rtx5090': 'RTX 5090', 'RTX5090': 'RTX 5090',
                    'rtx5080': 'RTX 5080', 'RTX5080': 'RTX 5080',
                    'rtx4090': 'RTX 4090', 'RTX4090': 'RTX 4090',
                    'rtx4080': 'RTX 4080', 'RTX4080': 'RTX 4080',
                    'other': '其他'
                };
                const gpuText = gpuMap[booking.gpu] || booking.gpu || '未知';

                return `
                    <tr>
                        <td>${date}</td>
                        <td>
                            <div>${booking.name || '未填写'}</div>
                            <div style="color: #888; font-size: 12px;">${booking.phone || ''}</div>
                        </td>
                        <td>${gpuText}</td>
                        <td class="${urgencyClass}">${urgencyText}</td>
                        <td>${booking.wait_time || '-'}</td>
                        <td>${booking.user_ip || '-'}</td>
                        <td>
                            <button class="btn btn-view" onclick="viewDetail('${booking.id}')">查看</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 查看详情
        function viewDetail(id) {
            alert('ID: ' + id);
        }

        // 页面加载完成后自动获取
        window.addEventListener('load', () => {
            setTimeout(loadData, 300);
        });
    </script>
</body>
</html>
